<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auralis Deploy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020508;color:#eef2f7;font-family:system-ui;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#0d1a27;border:1px solid rgba(77,184,255,.2);border-radius:16px;padding:28px;max-width:460px;width:100%}
.logo{font-family:Georgia,serif;font-style:italic;font-size:28px;color:#4db8ff;letter-spacing:.2em;margin-bottom:4px}
.sub{font-size:10px;color:rgba(238,242,247,.25);letter-spacing:.18em;margin-bottom:24px}
.btn{width:100%;padding:14px;background:#4db8ff;color:#020508;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px}
.btn:active{opacity:.8}
.btn.green{background:#3ecf7a}
.btn.red{background:rgba(255,95,114,.15);color:#ff5f72;border:1px solid rgba(255,95,114,.3)}
.log{background:rgba(0,0,0,.4);border-radius:8px;padding:12px;font-family:monospace;font-size:11px;line-height:1.9;max-height:200px;overflow-y:auto;margin-top:12px;display:none}
.ok{color:#3ecf7a}.err{color:#ff5f72}.dim{color:rgba(238,242,247,.35)}
.info{font-size:13px;color:rgba(238,242,247,.5);line-height:1.6;margin-bottom:20px}
</style>
</head>
<body>
<div class="card">
<div class="logo">auralis</div>
<div class="sub">GITHUB AUTO-DEPLOY</div>
<div class="info">Pushes the fixed index.html directly to GitHub. Vercel deploys automatically.</div>
<button class="btn" id="btn" onclick="run()">⬆ Push to GitHub → Deploy</button>
<div class="log" id="log"></div>
</div>
<script>

function log(msg, cls) {
var l = document.getElementById('log');
l.style.display = 'block';
l.innerHTML += '<div class="'+(cls||'dim')+'">'+msg+'</div>';
l.scrollTop = l.scrollHeight;
}

async function run() {

btn.disabled = true;
btn.textContent = 'Running…';
document.getElementById('log').innerHTML = '';

var r2 = await fetch('https://hifiaudio.flynns-arcade.app/?v='+Date.now());
var content = await r2.text();

if (content.includes('id="connect-modal"')) {
content = content.replace(
'id="connect-modal" style="display:none',
'id="connect-modal" style="display:flex'
);
log('Connect modal set to visible','ok');
}

log('Pushing to GitHub…');

body: JSON.stringify({message:'fix: Connect modal visible on load',content:b64,sha:sha})
});
